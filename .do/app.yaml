name: advancedanalytica-co-uk
region: lon
ingress:
  rules:
    - component:
        name: lead-api
      match:
        path:
          prefix: /api
    - component:
        name: web
      match:
        path:
          prefix: /
services:
  - name: web
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    git:
      branch: main
      repo_clone_url: https://github.com/JonathanBowker/advancedanalytica.co.uk.git
    build_command: pnpm build
    run_command: node ./dist/server/entry.mjs
    envs:
      - key: HOST
        value: 0.0.0.0
        scope: RUN_TIME
      - key: PUBLIC_GA_MEASUREMENT_ID
        value: G-J6XQFZQSSR
        scope: BUILD_TIME
functions:
  - name: lead-api
    git:
      branch: main
      repo_clone_url: https://github.com/JonathanBowker/advancedanalytica.co.uk.git
    source_dir: functions/contact
