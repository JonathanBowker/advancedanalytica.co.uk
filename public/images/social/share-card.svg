<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Advanced Analytica share image</title>
  <desc id="desc">Advanced Analytica branded social sharing image for link previews.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030508"/>
      <stop offset="0.52" stop-color="#0b0e14"/>
      <stop offset="1" stop-color="#171b24"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="0.78" cy="0.28" r="0.52">
      <stop offset="0" stop-color="#14B8A6" stop-opacity="0.58"/>
      <stop offset="0.42" stop-color="#14B8A6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="0.14" cy="0.88" r="0.5">
      <stop offset="0" stop-color="#14B8A6" stop-opacity="0.5"/>
      <stop offset="0.45" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#pinkGlow)"/>
  <rect width="1200" height="630" fill="url(#orangeGlow)"/>
  <path d="M960 112 C1032 172 1074 245 1110 338" fill="none" stroke="#14B8A6" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M916 154 C990 225 1032 308 1064 414" fill="none" stroke="#14B8A6" stroke-opacity="0.18" stroke-width="2"/>

